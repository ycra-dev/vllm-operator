# This rule is not used by the project vllm-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the llm.vllm-operator.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: vllm-operator
    app.kubernetes.io/managed-by: kustomize
  name: llm-editor-role
rules:
- apiGroups:
  - llm.vllm-operator.io
  resources:
  - llms
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - llm.vllm-operator.io
  resources:
  - llms/status
  verbs:
  - get
